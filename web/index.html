<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BingPot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --font: 'Inter', ui-sans-serif, -apple-system, system-ui, sans-serif;
    --sidebar-bg: #f9f9f9;
    --sidebar-hover: #ececec;
    --sidebar-active: #e3e3e3;
    --main-bg: #ffffff;
    --text: #0d0d0d;
    --text-secondary: #6e6e80;
    --border: #e5e5e5;
    --input-bg: #f4f4f4;
    --user-bubble: #f4f4f4;
    --send-btn: #000000;
    --send-btn-hover: #1a1a1a;
    --send-btn-disabled: #d4d4d4;
    --sidebar-width: 260px;
    --chat-max-width: 720px;
  }

  html, body {
    height: 100%;
    font-family: var(--font);
    background: var(--main-bg);
    color: var(--text);
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout ── */
  #app { display: flex; height: 100vh; overflow: hidden; }

  /* ── Sidebar ── */
  #sidebar {
    width: var(--sidebar-width);
    min-width: var(--sidebar-width);
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 8px;
  }

  #new-chat-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--text);
    cursor: pointer;
    font-size: 14px;
    font-family: var(--font);
    font-weight: 500;
    width: 100%;
    transition: background 0.1s;
    margin-bottom: 4px;
  }
  #new-chat-btn:hover { background: var(--sidebar-hover); }
  #new-chat-btn .btn-label { display: flex; align-items: center; gap: 10px; }

  #conv-list {
    flex: 1;
    overflow-y: auto;
    margin-top: 4px;
  }
  #conv-list::-webkit-scrollbar { width: 0; }

  .conv-section-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
    padding: 8px 10px 4px;
    text-transform: none;
    letter-spacing: 0;
  }

  .conv-item {
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: background 0.1s;
    line-height: 1.4;
  }
  .conv-item:hover { background: var(--sidebar-hover); }
  .conv-item.active { background: var(--sidebar-active); }

  /* ── Main ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--main-bg);
  }

  /* ── Top bar ── */
  #topbar {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    min-height: 50px;
    position: relative;
  }

  #status-wrap {
    position: absolute;
    right: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-secondary);
  }
  #status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #d4d4d4;
    transition: background 0.3s;
  }
  #status-dot.connected { background: #19c37d; }
  #status-dot.thinking { background: #f0a500; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── Messages ── */
  #messages-wrap {
    flex: 1;
    overflow-y: auto;
    scroll-behavior: smooth;
  }
  #messages-wrap::-webkit-scrollbar { width: 6px; }
  #messages-wrap::-webkit-scrollbar-thumb { background: #d4d4d4; border-radius: 3px; }

  #messages {
    max-width: var(--chat-max-width);
    margin: 0 auto;
    padding: 32px 16px 16px;
  }

  /* ── Empty state ── */
  #empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 120px 16px 0;
    text-align: center;
    pointer-events: none;
  }
  #empty-state h1 {
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    letter-spacing: -0.3px;
  }

  /* ── Message rows ── */
  .msg-wrap {
    margin-bottom: 4px;
    animation: fadein 0.15s ease;
  }
  @keyframes fadein { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; } }

  /* User message */
  .msg-wrap.user {
    display: flex;
    justify-content: flex-end;
    padding: 2px 0;
  }
  .msg-wrap.user .msg-content {
    background: var(--user-bubble);
    border-radius: 18px;
    padding: 12px 16px;
    max-width: 75%;
    font-size: 15px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text);
  }

  /* Assistant message */
  .msg-wrap.assistant {
    display: flex;
    justify-content: flex-start;
    padding: 2px 0;
  }
  .msg-wrap.assistant .msg-content {
    max-width: 100%;
    font-size: 15px;
    line-height: 1.75;
    color: var(--text);
    padding: 6px 0;
  }

  /* Markdown inside assistant */
  .msg-content p { margin-bottom: 14px; }
  .msg-content p:last-child { margin-bottom: 0; }
  .msg-content h1,.msg-content h2,.msg-content h3 {
    font-weight: 600;
    margin: 20px 0 8px;
    letter-spacing: -0.2px;
  }
  .msg-content h1 { font-size: 20px; }
  .msg-content h2 { font-size: 17px; }
  .msg-content h3 { font-size: 15px; }
  .msg-content ul,.msg-content ol {
    margin: 8px 0 14px 20px;
  }
  .msg-content li { margin-bottom: 6px; line-height: 1.65; }
  .msg-content code {
    background: #f0f0f0;
    border: 1px solid #e0e0e0;
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 13.5px;
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    color: #c7254e;
  }
  .msg-content pre {
    background: #f6f6f6;
    border: 1px solid #e8e8e8;
    border-radius: 8px;
    padding: 16px;
    overflow-x: auto;
    margin: 12px 0;
  }
  .msg-content pre code {
    background: none;
    border: none;
    padding: 0;
    color: var(--text);
    font-size: 13.5px;
  }
  .msg-content strong { font-weight: 600; }
  .msg-content em { font-style: italic; }
  .msg-content a { color: #2563eb; text-decoration: underline; text-underline-offset: 2px; }
  .msg-content blockquote {
    border-left: 3px solid #d4d4d4;
    margin: 12px 0;
    padding: 4px 16px;
    color: var(--text-secondary);
  }
  .msg-content table { border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 14px; }
  .msg-content th,.msg-content td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
  .msg-content th { background: var(--input-bg); font-weight: 600; }
  .msg-content hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  /* ── Typing indicator ── */
  #typing-row {
    display: none;
    padding: 2px 0 6px;
    margin-bottom: 4px;
  }
  #typing-row.visible { display: flex; }
  .typing-dots { display: flex; gap: 3px; align-items: center; height: 20px; }
  .typing-dots span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #b0b0b0;
    animation: tdot 1.4s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes tdot { 0%,80%,100%{transform:scale(0.7);opacity:.5} 40%{transform:scale(1);opacity:1} }

  /* ── Input area ── */
  #input-area {
    padding: 12px 16px 20px;
    background: var(--main-bg);
  }

  #input-inner {
    max-width: var(--chat-max-width);
    margin: 0 auto;
  }

  #input-box {
    display: flex;
    align-items: flex-end;
    background: var(--input-bg);
    border-radius: 16px;
    border: 1px solid transparent;
    padding: 10px 10px 10px 16px;
    gap: 8px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  #input-box:focus-within {
    border-color: #b4b4b4;
    box-shadow: 0 0 0 1px #f0f0f0;
  }

  #msg-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 15px;
    font-family: var(--font);
    resize: none;
    max-height: 200px;
    line-height: 1.6;
    padding: 2px 0;
  }
  #msg-input::placeholder { color: #9e9ea8; }

  #send-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: none;
    background: var(--send-btn);
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.1s;
  }
  #send-btn:hover:not(:disabled) { background: var(--send-btn-hover); }
  #send-btn:disabled { background: var(--send-btn-disabled); cursor: default; }

  #input-hint {
    text-align: center;
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 8px;
  }
</style>
</head>
<body>
<div id="app">

  <!-- Sidebar -->
  <div id="sidebar">
    <button id="new-chat-btn" onclick="startNewChat()">
      <span class="btn-label">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        BingPot
      </span>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
    <div id="conv-list"></div>
  </div>

  <!-- Main -->
  <div id="main">

    <div id="topbar">
      <span style="font-size:15px;font-weight:500">BingPot</span>
      <div id="status-wrap">
        <div id="status-dot"></div>
        <span id="status-label">connecting…</span>
      </div>
    </div>

    <div id="messages-wrap">
      <div id="messages">
        <div id="empty-state">
          <h1>What can I help with?</h1>
        </div>
      </div>

      <div id="typing-row" style="max-width:720px;margin:0 auto;padding:0 16px">
        <div class="typing-dots"><span></span><span></span><span></span></div>
      </div>
    </div>

    <div id="input-area">
      <div id="input-inner">
        <div id="input-box">
          <textarea id="msg-input" rows="1" placeholder="Message BingPot"></textarea>
          <button id="send-btn" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="19" x2="12" y2="5"/>
              <polyline points="5 12 12 5 19 12"/>
            </svg>
          </button>
        </div>
        <div id="input-hint">BingPot can make mistakes. Check important info.</div>
      </div>
    </div>

  </div>
</div>

<script>
const WEB_JID = 'web:default@web';
let ws = null;
let currentJid = WEB_JID;
let waitingForReply = false;

marked.setOptions({ breaks: true, gfm: true });

// ── WebSocket ──
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);

  ws.onopen = () => {
    setStatus('connected');
    joinJid(currentJid);
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'history') {
      renderHistory(msg.messages);
    } else if (msg.type === 'message') {
      if (msg.role === 'assistant') {
        setThinking(false);
        waitingForReply = false;
        setInputEnabled(true);
      }
      if (msg.role === 'user' && waitingForReply) return;
      appendMessage(msg.role, msg.content);
    } else if (msg.type === 'typing') {
      setThinking(msg.active);
    }
  };

  ws.onclose = () => {
    setStatus('disconnected');
    setTimeout(connect, 2000);
  };
}

function joinJid(jid) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'join', jid }));
  }
}

// ── Status ──
function setStatus(state) {
  const dot = document.getElementById('status-dot');
  const label = document.getElementById('status-label');
  dot.className = state;
  label.textContent = state === 'connected' ? 'Connected' : state === 'thinking' ? 'Thinking…' : 'Reconnecting…';
}

function setThinking(active) {
  const row = document.getElementById('typing-row');
  row.className = active ? 'visible' : '';
  setStatus(active ? 'thinking' : 'connected');
  if (active) scrollToBottom();
}

// ── Rendering ──
function hideEmptyState() {
  const el = document.getElementById('empty-state');
  if (el) el.remove();
}

function appendMessage(role, content) {
  hideEmptyState();
  const messages = document.getElementById('messages');

  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${role}`;

  const inner = document.createElement('div');
  inner.className = 'msg-content';

  if (role === 'assistant') {
    inner.innerHTML = marked.parse(content);
  } else {
    inner.textContent = content;
  }

  wrap.appendChild(inner);
  messages.appendChild(wrap);
  scrollToBottom();
}

function renderHistory(messages) {
  const container = document.getElementById('messages');
  if (messages.length === 0) {
    container.innerHTML = '<div id="empty-state"><h1>What can I help with?</h1></div>';
    return;
  }
  container.innerHTML = '';
  for (const m of messages) appendMessage(m.role, m.content);
}

function scrollToBottom() {
  const el = document.getElementById('messages-wrap');
  el.scrollTop = el.scrollHeight;
}

// ── Conversations ──
async function loadConversations() {
  try {
    const res = await fetch('/api/conversations');
    const convs = await res.json();
    const list = document.getElementById('conv-list');
    list.innerHTML = '';

    const webConvs = convs.filter(c => c.jid && c.jid.startsWith('web:'));
    if (webConvs.length === 0) webConvs.push({ jid: WEB_JID, name: 'Web Chat' });

    if (webConvs.length > 0) {
      const label = document.createElement('div');
      label.className = 'conv-section-label';
      label.textContent = 'Today';
      list.appendChild(label);
    }

    for (const c of webConvs) {
      const el = document.createElement('div');
      el.className = 'conv-item' + (c.jid === currentJid ? ' active' : '');
      el.textContent = c.name || 'Web Chat';
      el.onclick = () => switchConversation(c.jid, el);
      list.appendChild(el);
    }
  } catch {}
}

function switchConversation(jid, el) {
  document.querySelectorAll('.conv-item').forEach(e => e.classList.remove('active'));
  el?.classList.add('active');
  currentJid = jid;
  joinJid(jid);
}

function startNewChat() {
  switchConversation(WEB_JID, document.querySelector('.conv-item'));
}

// ── Sending ──
function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || waitingForReply || !ws || ws.readyState !== WebSocket.OPEN) return;

  waitingForReply = true;
  setInputEnabled(false);
  appendMessage('user', text);
  setThinking(true);
  input.value = '';
  autoResize(input);

  ws.send(JSON.stringify({ type: 'message', jid: currentJid, content: text }));
}

function setInputEnabled(enabled) {
  const btn = document.getElementById('send-btn');
  const input = document.getElementById('msg-input');
  input.disabled = !enabled;
  btn.disabled = !enabled || input.value.trim() === '';
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

document.getElementById('msg-input').addEventListener('input', function() {
  autoResize(this);
  document.getElementById('send-btn').disabled = this.value.trim() === '' || waitingForReply;
});

document.getElementById('msg-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

document.getElementById('send-btn').addEventListener('click', sendMessage);

// ── Init ──
connect();
loadConversations();
setInterval(loadConversations, 15000);
</script>
</body>
</html>
